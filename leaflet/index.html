<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet + OpenStreetMap 開源地圖範例</title>
    <link rel="stylesheet" href="lib/leaflet/css/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 12px;
        }

        #info {
            margin: 10px 0;
            padding: 10px 14px;
            background: #fff;
            border-left: 4px solid #3388ff;
            border-radius: 4px;
            font-size: 14px;
            min-height: 24px;
        }

        #info.error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        #map {
            width: 100%;
            height: 560px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #hover-coords {
            margin-top: 6px;
            padding: 6px 12px;
            background: #fff;
            border-left: 4px solid #27ae60;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
            color: #27ae60;
        }

        #getLocation {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background: #3388ff;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        #getLocation:hover {
            background: #1a6fd4;
        }
    </style>
</head>
<body>
    <h1>Leaflet + OpenStreetMap 開源地圖範例</h1>
    <div id="app">
        <div id="info">
            緯度: {{ positionInfo.latitude }} | 經度: {{ positionInfo.longitude }}
        </div>
        <div class="error">
            {{ errorMessage }}
        </div>
        <div id="map"></div>
    </div>
    <script src="lib/vue/vue.global.prod.js"></script>
    <script src="lib/leaflet/js/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
