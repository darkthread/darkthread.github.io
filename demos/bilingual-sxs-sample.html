<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* ── Tokens ──────────────────────────────────── */
        :root {
            --c-text:        #212529;
            --c-orig:        #343a40;
            --c-trans:       #1a5276;
            --c-muted:       #495057;
            --c-border:      #dee2e6;
            --c-border-soft: #e9ecef;
            --c-border-hint: #adb5bd;
            --c-bg-hint:     #f8f9fa;
            --c-bg-code:     #e9ecef;
            --c-focus:       #ffeeba;
        }

        /* ── Base ────────────────────────────────────── */
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.8;
            color: var(--c-text);
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--c-border);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        /* ── Paragraph ───────────────────────────────── */
        .paragraph {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--c-border-soft);

            p span {
                margin-right: 0.5rem;
                cursor: pointer;
            }

            p.orig {
                color: var(--c-orig);
                font-size: 1rem;
                margin: 0 0 0.5rem;
            }

            p.trans {
                color: var(--c-trans);
                font-size: 1rem;
                margin: 0 0 0.5rem;
            }

            .hint {
                font-size: 0.875rem;
                color: var(--c-muted);
                background: var(--c-bg-hint);
                border-left: 4px solid var(--c-border-hint);
                padding: 0.5rem 1rem;
                margin: 0;

                ul {
                    margin: 0.25rem 0 0;
                    padding-left: 1.25rem;
                }

                li {
                    margin-bottom: 0.25rem;
                    cursor: default;
                }

                code {
                    background: var(--c-bg-code);
                    padding: 0.1rem 0.3rem;
                    border-radius: 3px;
                    font-size: 0.85em;
                }

                strong {
                    color: var(--c-orig);
                    display: block;
                }
            }
        }

        /* ── Toolbar ─────────────────────────────────── */
        .toolbar {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            opacity: 0.35;

            &:hover { opacity: 1; }

            button {
                padding: 0.45rem 0.9rem;
                min-width: 5rem;
                border: 1px solid var(--c-border-hint);
                border-radius: 10px;
                background: #fff;
                color: var(--c-muted);
                font-size: 0.85rem;
                cursor: pointer;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
                transition: background 0.2s, color 0.2s;
            }

            button.active {
                background: var(--c-trans);
                color: #fff;
                border-color: var(--c-trans);
            }

            button:disabled {
                background: var(--c-border-soft);
                color: var(--c-border-hint);
                border-color: var(--c-border-soft);
                cursor: not-allowed;
            }
        }

        /* ── Highlight ───────────────────────────────── */
        p.orig mark           { background: lightpink; color: inherit; }
        .mapping p span.focus { background: var(--c-focus); }

        /* ── Visibility Toggles ──────────────────────── */
        .hint, p.orig, p.trans, span.map-trans { display: none; }

        .show-hint .hint    { display: block; }
        .show-orig p.orig   { display: block; }
        .show-trans p.trans { display: block; }

        .interleave span.map-trans { display: inline; color: var(--c-trans); }
        .interleave .trans         { display: none; }
    </style>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div
            :class="{ 'show-hint': showOrig && showHint, 'show-orig': showOrig, 'show-trans': showTrans && !interleave, 'mapping': bilingual && mapping, 'interleave': bilingual && interleave }">
            <div class="toolbar">
                <button :class="{ active: showOrig }" :disabled="!bilingual && showOrig" @click="toggle('showOrig')">原文</button>
                <button :class="{ active: showTrans }" :disabled="!bilingual && showTrans" @click="toggle('showTrans')">翻譯</button>
                <button :class="{ active: showHint }" v-show="showOrig" @click="toggle('showHint')">提示</button>
                <button class="active" v-show="bilingual && interleave" @click="mode = 'mapping'">對照</button>
                <button class="active" v-show="bilingual && mapping" @click="mode = 'interleave'">穿插</button>
            </div>
            <h1>{{ title }}</h1>
            <div class="paragraph" v-for="(para, pidx) in paragraphs" :key="pidx">
                <p class="orig">
                    <span v-for="(sentence, sidx) in para.O" :key="sidx"
                        :class="{ focus: focusIdx === `s-${pidx}-${sidx}` }"
                        @mouseenter="focusIdx = `s-${pidx}-${sidx}`" @mouseleave="focusIdx = ''" :title="para.T[sidx]">
                        <span v-html="highlightWord(sentence)"></span>
                        <span class="map-trans">{{ para.T[sidx] }}</span>
                    </span>


                </p>
                <p class="trans">
                    <span v-for="(sentence, sidx) in para.T" :key="sidx"
                        :class="{ focus: focusIdx === `s-${pidx}-${sidx}` }"
                        @mouseenter="focusIdx = `s-${pidx}-${sidx}`" @mouseleave="focusIdx = ''"
                        v-html="sentence"></span>
                </p>
                <div class="hint">
                    <ul>
                        <li v-for="(hint, hIndex) in para.H" :key="hIndex" @mouseenter="hoveredWord = hint.E"
                            @mouseleave="hoveredWord = ''">
                            <strong>{{ hint.W }}</strong> {{ hint.D }}
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    title: '',
                    paragraphs: [],
                    hoveredWord: '',
                    focusIdx: '',
                    showOrig: true,
                    showTrans: true,
                    showHint: true,
                    mode: 'mapping'
                };
            },
            computed: {
                bilingual() {
                    return this.showOrig && this.showTrans;
                },
                mapping() {
                    return this.bilingual && this.mode === 'mapping';
                },
                interleave() {
                    return this.bilingual && this.mode === 'interleave';
                }
            },
            methods: {
                highlightWord(text) {
                    if (!this.hoveredWord) return text;
                    const escaped = this.hoveredWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
                },
                async toggle(key) {
                    // 找出目前viewport最上方的 .paragraph
                    const anchor = [...document.querySelectorAll('.paragraph')]
                        .find(el => el.getBoundingClientRect().top >= 0);
                    const anchorTop = anchor ? anchor.getBoundingClientRect().top : null;

                    this[key] = !this[key];

                    await this.$nextTick();

                    if (anchor && anchorTop !== null) {
                        const newTop = anchor.getBoundingClientRect().top;
                        window.scrollBy(0, newTop - anchorTop);
                    }
                }
            }
        });
        const vm = app.mount('#app');
    </script>
